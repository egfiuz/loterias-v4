<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Loterias - Criar Conta VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Criar Conta VIP</h2>

            <form id="formCadastro">
                <div class="input-group">
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" placeholder="Seu E-mail" required>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" placeholder="Sua Senha" required>
                </div>

                <button type="submit" id="btnCadastrar">Cadastrar</button>
            </form>

            <p id="mensagem" class="erro-msg"></p>

            <p class="login-link">Já tem uma conta? <a href="#">Faça Login</a></p>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // Lógica para capturar o envio do formulário
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value
            };

            // Chama a função que está no seu script.js
            cadastrarUsuario(payload);
        });
    </script>
</body>
</html>
